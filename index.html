<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRA | Tactical Map Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=500;700;900&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ffcc; 
            --accent-glow: rgba(0, 255, 204, 0.15);
            --bg-dark: #05070a; 
            --panel-bg: rgba(15, 19, 26, 0.95);
            --border-dim: #1e2530;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --lock-color: #ff3b30;
        }
        
        body, html {
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100%;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            user-select: none;
        }

        .app-container {
            display: flex;
            flex-direction: column-reverse; 
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        .bottom-sheet {
            width: 100vw;
            height: 38vh;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-dim);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 14px 18px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .map-viewport { 
            flex-grow: 1;
            height: 62vh; 
            position: relative;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-image: radial-gradient(rgba(255,255,255,0.015) 1px, transparent 0);
            background-size: 16px 16px;
            overflow: hidden; 
            touch-action: none;
        }

        #mapWrapper {
            position: absolute;
            transform-origin: center center;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mapBoard { 
            position: relative; 
            width: 90vw; 
            aspect-ratio: 1/1; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 50; 
            touch-action: none; 
            width: 100%;
            height: 100%;
        }

        /* LAPTOP CONFIGURATION */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row; 
            }
            .bottom-sheet {
                width: 320px;
                height: calc(100vh - 40px);
                margin: 20px 0 20px 20px; 
                border: 1px solid var(--border-dim);
                border-radius: 12px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.7);
                background: rgba(15, 19, 26, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: 24px 20px;
            }
            .map-viewport {
                width: calc(100vw - 360px);
                height: 100vh;
            }
            #mapBoard {
                width: 82vh; 
            }
            .action-grid {
                margin-top: auto !important;
            }
            .tool-btn::after {
                content: attr(data-key);
                display: block;
                font-size: 8px;
                opacity: 0.4;
                margin-top: 2px;
            }
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 8px;
        }

        .sheet-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            margin: 0;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .sheet-header h1 span { color: var(--accent); }

        .control-row { margin-bottom: 14px; }

        .control-row label, .selector-block label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .tool-box { 
            display: flex; 
            background: #0a0d14; 
            padding: 3px; 
            border-radius: 6px; 
            border: 1px solid var(--border-dim); 
            gap: 3px;
            flex-wrap: wrap;
        }

        .tool-btn { 
            flex: 1; 
            min-width: 40px;
            padding: 8px 2px; 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .tool-btn.active { 
            background: var(--accent-glow); 
            color: var(--accent); 
            border: 1px solid rgba(0, 255, 204, 0.25);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        .tool-btn.active-lock {
            background: rgba(255, 59, 48, 0.1);
            color: var(--lock-color);
            border: 1px solid rgba(255, 59, 48, 0.25);
        }

        .options-panel {
            background: #141a24;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-dim);
            margin-top: 8px;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-family: 'Orbitron', sans-serif;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .custom-slider {
            width: 100%;
            background: #0a0d14;
            height: 5px;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            margin: 4px 0;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent);
        }

        /* ─── FIXED SELECTOR ROW & CUSTOM DROPDOWN ─── */
        .selector-row {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .selector-block {
            display: flex;
            flex-direction: column;
            position: relative; /* For Custom Dropdown positioning */
        }

        .fixed-input-field {
            width: 100%;
            height: 38px; 
            box-sizing: border-box;
            background: #0a0d14; 
            border: 1px solid var(--border-dim); 
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .fixed-input-field:focus-within, .fixed-input-field:hover {
            border-color: rgba(0, 255, 204, 0.4);
        }

        /* ─── NEW CUSTOM DROPDOWN SYSTEM ─── */
        .custom-select-trigger {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            box-sizing: border-box;
            color: var(--text-main);
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .custom-select-trigger::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid var(--accent); /* Tactical Cyan Arrow */
            transition: transform 0.2s ease;
        }

        .custom-dropdown-container.open .custom-select-trigger::after {
            transform: rotate(180deg);
        }

        .custom-options-list {
            position: absolute;
            top: 56px; /* Position right underneath label + trigger box
